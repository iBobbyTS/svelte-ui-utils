name: Bun Consumer Check

on:
  workflow_dispatch:
    inputs:
      package_ref:
        description: Package ref to install
        required: true
        default: github:iBobbyTS/svelte-ui-utils

permissions:
  contents: read

jobs:
  bun-install:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create consumer project
        run: |
          mkdir consumer
          cd consumer
          cat > package.json <<'JSON'
          {
            "name": "svelte-ui-utils-bun-consumer-check",
            "private": true,
            "type": "module",
            "dependencies": {
              "@ibobbyts/svelte-ui-utils": "${{ inputs.package_ref }}",
              "svelte": "^5.55.3"
            }
          }
          JSON

      - name: Install with Bun
        working-directory: consumer
        run: bun install

      - name: Verify installed package files
        working-directory: consumer
        run: |
          test -f node_modules/@ibobbyts/svelte-ui-utils/dist/style.css
          test -f node_modules/@ibobbyts/svelte-ui-utils/dist/toast/index.js
          test -f node_modules/@ibobbyts/svelte-ui-utils/dist/dropdown-search/index.js
          test -f node_modules/@ibobbyts/svelte-ui-utils/dist/data-table/index.js

      - name: Show Bun lock entry
        working-directory: consumer
        run: |
          sed -n '1,120p' bun.lock
